services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mealmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mealmind}
      POSTGRES_DB: ${POSTGRES_DB:-mealmind}
    ports:
      - "54320:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mealmind} -d ${POSTGRES_DB:-mealmind}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ai-gateway:
    build:
      context: .
      dockerfile: services/ai-gateway/Dockerfile
    environment:
      PORT: 8080
      LM_STUDIO_URL: ${LM_STUDIO_URL:-http://host.docker.internal:1234}
    ports:
      - "3103:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgres://mealmind:mealmind@postgres:5432/mealmind
      MEALMIND_RECIPE_ROOT: /app/recipes
      MEALMIND_DOCS_ROOT: /app/docs
      MEALMIND_AI_BASE_URL: ${MEALMIND_AI_BASE_URL:-http://ai-gateway:8080/v1}
    ports:
      - "3101:3001"
    volumes:
      - ./recipes:/app/recipes:ro
      - ./docs:/app/docs:ro
    depends_on:
      postgres:
        condition: service_healthy
      ai-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  mcp:
    build:
      context: .
      dockerfile: services/mcp/Dockerfile
    environment:
      PORT: 3002
      MEALMIND_API_BASE_URL: http://api:3001
      MEALMIND_DOCS_ROOT: /app/docs
    ports:
      - "3102:3002"
    volumes:
      - ./docs:/app/docs:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: 3000
      MEALMIND_API_BASE_URL: http://api:3001
      MEALMIND_MCP_BASE_URL: http://mcp:3002
    ports:
      - "3100:3000"
    depends_on:
      api:
        condition: service_healthy
      mcp:
        condition: service_healthy

volumes:
  pg_data:
